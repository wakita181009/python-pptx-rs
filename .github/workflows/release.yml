name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Tag must match workspace version
        run: |
          cargo_version=$(grep -m1 '^version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "$cargo_version" != "$tag_version" ]; then
            echo "::error::tag v$tag_version != Cargo.toml version $cargo_version"
            exit 1
          fi

  build:
    name: wheel (${{ matrix.platform }})
    needs: check-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64
            runner: ubuntu-latest
            target: x86_64
          - platform: linux-aarch64
            runner: ubuntu-24.04-arm
            target: aarch64
          - platform: macos-universal2
            runner: macos-latest
            target: universal2-apple-darwin
          - platform: windows-x64
            runner: windows-latest
            target: x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      # abi3-py310: one wheel per platform covers CPython 3.10+
      - uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          manylinux: auto
      - uses: actions/upload-artifact@v7
        with:
          name: wheel-${{ matrix.platform }}
          path: dist

  sdist:
    needs: check-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist

  publish:
    needs: [build, sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/python-pptx-rs
    permissions:
      # OIDC for PyPI Trusted Publishing — no API token stored anywhere
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
