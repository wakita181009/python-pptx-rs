name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - uses: astral-sh/setup-uv@v8.3.0
        with:
          python-version: "3.10"

      - name: ruff check
        run: uvx ruff check --output-format=github python tests

      - name: ruff format
        run: uvx ruff format --check python tests

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  rust-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - uses: Swatinem/rust-cache@v2

      - uses: astral-sh/setup-uv@v8.3.0
        with:
          python-version: "3.14"

      # The PyO3 binding crate (pptx-python) is only exercised through Python,
      # so pytest runs against an instrumented `maturin develop` build and its
      # profile data is merged with the `cargo test` run.
      - name: cargo test + pytest with coverage instrumentation
        run: |
          source <(cargo llvm-cov show-env --export-prefix)
          cargo llvm-cov clean --workspace
          cargo test --workspace
          uv sync --no-install-project
          uv run --no-sync maturin develop --uv
          uv run --no-sync pytest --no-cov
          cargo llvm-cov report --lcov --output-path rust-coverage.lcov
          cargo llvm-cov report --fail-under-lines 80

      - uses: codecov/codecov-action@v5
        with:
          files: rust-coverage.lcov
          flags: rust
          token: ${{ secrets.CODECOV_TOKEN }}

  python-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - uses: astral-sh/setup-uv@v8.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Build extension and install dev dependencies
        run: uv sync

      - name: pytest
        run: uv run pytest --cov-report=xml

      - uses: codecov/codecov-action@v5
        if: matrix.python-version == '3.14'
        with:
          files: coverage.xml
          flags: python
          token: ${{ secrets.CODECOV_TOKEN }}
